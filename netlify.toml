# Netlify build configuration.
# The Next.js website lives in the frontend/ subfolder, so Netlify must build
# from there. The official Next.js plugin handles SSR, API routes, and Server
# Actions automatically.

[build]
  base = "frontend"
  # Build with webpack (not Turbopack): Netlify's Next.js plugin can't bundle
  # Turbopack-compiled middleware into an edge function.
  command = "npm run build -- --webpack"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
